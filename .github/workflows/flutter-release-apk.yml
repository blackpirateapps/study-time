name: Flutter Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/flutter_app/**'
      - '.github/workflows/flutter-release-apk.yml'

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure Flutter Android scaffold exists
        run: |
          if [ ! -d "apps/flutter_app/android" ]; then
            flutter create --platforms=android,ios --project-name aura_flutter apps/flutter_app
          fi

      - name: Install CI Gradle init script
        run: |
          if [ -d "apps/flutter_app/android" ]; then
            mkdir -p apps/flutter_app/android/gradle/init.d
            cp .github/gradle/init.d/ci-init.gradle.kts apps/flutter_app/android/gradle/init.d/ci-init.gradle.kts
          fi

      - name: Patch Isar Namespace Issue
        run: |
          # Patch for Groovy build.gradle
          if [ -f "apps/flutter_app/android/build.gradle" ]; then
            cat >> "apps/flutter_app/android/build.gradle" <<EOF

          subprojects { project ->
              if (project.state.executed) {
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          if (namespace == null) {
                              namespace project.group
                          }
                      }
                  }
              } else {
                  project.afterEvaluate {
                      if (project.hasProperty('android')) {
                          project.android {
                              compileSdkVersion 34
                              if (namespace == null) {
                                  namespace project.group
                              }
                          }
                      }
                  }
              }
          }
          EOF
          fi

          # Patch for Kotlin build.gradle.kts
          # NOTE: Skipping automatic Kotlin (build.gradle.kts) patching.
          # Appending Kotlin DSL snippets to the generated build.gradle.kts has caused
          # Gradle configuration failures in CI (syntax / API incompatibilities).
          # If you need a Kotlin DSL patch, add it manually to your Android project
          # or provide a committed gradle script that can be safely applied here.

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: apps/flutter_app

      - name: Generate Dart code
        run: flutter pub run build_runner build --delete-conflicting-outputs
        working-directory: apps/flutter_app

      - name: Analyze Flutter code
        run: flutter analyze
        working-directory: apps/flutter_app

      - name: Generate CI keystore
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-aura-release-password}"
          KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-aura-release-password}"

          mkdir -p android/app

          keytool -genkeypair \
            -v \
            -keystore android/app/upload-keystore.jks \
            -storetype PKCS12 \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Aura CI, OU=Mobile, O=Aura, L=Remote, S=Remote, C=US"

          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF
        working-directory: apps/flutter_app

      - name: Build release APK
        run: flutter build apk --release
        working-directory: apps/flutter_app

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-release-apk
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
