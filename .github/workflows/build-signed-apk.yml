name: Build Signed APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'apps/flutter_app/**'
      - '.github/gradle/**'
      - '.github/workflows/build-signed-apk.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Global Gradle Init Script
        run: |
          mkdir -p ~/.gradle/init.d
          cp .github/gradle/init.d/ci-init.gradle ~/.gradle/init.d/

      - name: Bootstrap Android Scaffold
        working-directory: apps/flutter_app
        run: |
          flutter create --platforms=android --project-name aura_flutter .
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

          if [ -f android/app/build.gradle ]; then
            sed -i 's/namespace = ".*"/namespace = "com.aura.flutter"/' android/app/build.gradle
            sed -i 's/applicationId = ".*"/applicationId = "com.aura.flutter"/' android/app/build.gradle
            sed -i 's/namespace ".*"/namespace "com.aura.flutter"/' android/app/build.gradle
            sed -i 's/applicationId ".*"/applicationId "com.aura.flutter"/' android/app/build.gradle
          fi
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/namespace = ".*"/namespace = "com.aura.flutter"/' android/app/build.gradle.kts
            sed -i 's/applicationId = ".*"/applicationId = "com.aura.flutter"/' android/app/build.gradle.kts
          fi
          if [ -f android/settings.gradle ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.1.0"/' android/settings.gradle
          fi
          if [ -f android/settings.gradle.kts ]; then
            sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "2.1.0"/' android/settings.gradle.kts
          fi

          sed -i 's/ package="[^"]*"//g' android/app/src/main/AndroidManifest.xml

      - name: Install Dependencies & Generate Code
        working-directory: apps/flutter_app
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Generate CI keystore
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEY_PASS="${ANDROID_KEY_PASSWORD:-aura-release-password}"
          STORE_PASS="${ANDROID_KEYSTORE_PASSWORD:-aura-release-password}"
          mkdir -p android/app
          keytool -genkeypair -v -keystore android/app/upload-keystore.jks \
            -storetype PKCS12 -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
            -dname "CN=Aura CI, OU=Mobile, O=Aura, L=Remote, S=Remote, C=US"
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASS
          keyPassword=$KEY_PASS
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF
          test -f android/app/upload-keystore.jks
        working-directory: apps/flutter_app

      - name: Build Release APK
        run: flutter build apk --release
        working-directory: apps/flutter_app

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: aura-release-apk
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
