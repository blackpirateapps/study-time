name: Build Signed APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'apps/flutter_app/**'
      - '.github/workflows/build-signed-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Global Gradle Init Script
        run: |
          mkdir -p ~/.gradle/init.d
          # Copy the Groovy version of the script to the global Gradle config
          cp .github/gradle/init.d/ci-init.gradle ~/.gradle/init.d/

      - name: Bootstrap & Repair Android Scaffold
        working-directory: apps/flutter_app
        run: |
          # 1. Backup your custom build.gradle patch
          if [ -f "android/build.gradle" ]; then
            mv android/build.gradle android_build.gradle.bak
          fi
          
          # 2. Force recreate missing or malformed boilerplate
          flutter create --platforms=android --project-name aura_flutter .
          
          # 3. Restore the custom AGP 8+ patch
          if [ -f "android_build.gradle.bak" ]; then
            mv android_build.gradle.bak android/build.gradle
          fi

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: apps/flutter_app

      - name: Run Code Generation (Isar/Freezed)
        run: flutter pub run build_runner build --delete-conflicting-outputs
        working-directory: apps/flutter_app

      - name: Generate CI keystore
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEY_PASS="${ANDROID_KEY_PASSWORD:-aura-release-password}"
          STORE_PASS="${ANDROID_KEYSTORE_PASSWORD:-aura-release-password}"
          mkdir -p android/app
          keytool -genkeypair -v -keystore android/app/upload-keystore.jks \
            -storetype PKCS12 -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
            -dname "CN=Aura CI, OU=Mobile, O=Aura, L=Remote, S=Remote, C=US"
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASS
          keyPassword=$KEY_PASS
          keyAlias=upload
          storeFile=app/upload-keystore.jks
          EOF
        working-directory: apps/flutter_app

      - name: Build release APK
        run: flutter build apk --release
        working-directory: apps/flutter_app

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-release-apk
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
