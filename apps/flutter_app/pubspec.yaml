name: aura_flutter
description: Aura social study tracker (Cupertino-first)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.3.1
  firebase_core: ^3.8.1
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  hive_flutter: ^1.1.0
  http: ^1.2.2
  intl: ^0.19.0
  riverpod_annotation: ^2.5.1
  uuid: ^4.5.1
  workmanager: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.5.1

flutter:
  uses-material-design: false
